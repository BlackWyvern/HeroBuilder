<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Champions Online Planner</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>

    <div class="main-container">
        <div class="left-col">
            <div class="powerset-nav">
                <div id="powerset-tabs"></div>
            </div>

            <h3 id="current-powerset-title">Force</h3>
            <div id="power-library"></div>
        </div>

        <div class="right-col">
            <div id="system-message" class="system-message"></div>
            <div class="slots-container vertical" id="selected-slots"></div>
        </div>
    </div>

    <div id="active-specs-hud"></div>

    <div id="stat-selection-modal" class="floating-window" style="display:none; width: 900px;">
        <div class="modal-header">
            <h3 id="stat-selector-title" style="margin: 0;">Select Stat</h3>
            <span class="close-btn" onclick="closeStatSelectionModal()">&times;</span>
        </div>
        <div id="stat-selection-content" style="margin-top: 15px;"></div>
    </div>

    <div id="tree-selection-modal" class="floating-window" style="display:none; width: 900px;">
        <div class="modal-header">
            <h3 id="tree-selector-title" style="margin: 0;">Select Tree</h3>
            <span class="close-btn" onclick="closeTreeSelectionModal()">&times;</span>
        </div>
        <div id="tree-selection-content" style="margin-top: 15px;"></div>
    </div>

    <div id="perk-allocation-modal" class="floating-window" style="display:none; flex-direction: column; width: 900px;">
        <div class="modal-header">
            <h3 id="perk-modal-title" style="margin: 0; color: #4DA8DA; font-size: 24px;">Tree Name</h3>
            <div style="color: white; font-weight: bold; margin-left: auto; margin-right: 20px; font-size: 18px;">Points Spent: <span id="modal-tree-spent">0</span>/10</div>
            <button id="change-tree-btn" style="margin-right: 15px; padding: 8px 15px; background: #555; color: white; border: 1px solid #777; cursor: pointer; font-weight: bold;">Change Tree</button>
            <span class="close-btn" onclick="closePerkModal()">&times;</span>
        </div>
        <div id="perk-list-container" style="margin-top: 15px; display: flex; flex-direction: column; gap: 15px;"></div>
    </div>

    <div style="position: fixed; bottom: 20px; left: 20px; z-index: 10000;">
        <button id="dev-mode-btn" onclick="toggleDevMode()" style="padding: 10px; background: #ff5555; color: white; border: none; font-weight: bold; cursor: pointer; border-radius: 4px;">Enable Developer Sprite Mode</button>
    </div>

    <div id="sprite-modal" style="position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.9); display: none; flex-direction: column; align-items: center; overflow: auto; z-index: 11000;">
        <div id="modal-controls" style="position: sticky; top: 0; background: #111; padding: 15px; border-bottom: 2px solid #333; z-index: 100; box-shadow: 0 4px 6px rgba(0,0,0,0.5); display: flex; align-items: center; justify-content: center; gap: 15px; flex-wrap: wrap;">
            <span style="color: white; font-weight: bold;">Image Scale Factor:</span>
            <input type="number" id="crop-scale" value="1.0" step="0.1" min="0.1" style="width: 60px;">
            <button id="crop-confirm-btn" onclick="confirmCrop()" style="display: none; background: #4CAF50; color: white; padding: 10px 20px; font-weight: bold; font-size: 16px;">Confirm</button>
            <button onclick="closeModal()" style="background: #555; color: white; padding: 10px 20px; font-size: 16px;">Cancel</button>
        </div>
        <div id="img-wrapper" style="position: relative; display: inline-block; margin-top: 20px; cursor: crosshair;">
            <img src="sprites.png" id="sprite-image" style="display: block; max-width: none; user-select: none; border: 1px solid #333; image-rendering: pixelated;" onerror="alert('Could not find sprites in this folder!')">
            <div id="selection-box" style="position: absolute; border: 2px solid #0f0; background: rgba(0, 255, 0, 0.3); pointer-events: none; display: none; box-sizing: border-box; z-index: 10;"></div>
        </div>
    </div>

    <div id="dev-panel" style="position: fixed; bottom: 20px; right: 20px; width: 600px; z-index: 9000; border: 2px solid #555; padding: 15px; background: #1a0000; display: none;">
        <h3 style="color: #ff5555; margin-top: 0;">Developer Output</h3>
        <div class="dev-controls" style="background: #333; padding: 10px; border-radius: 4px; margin-bottom: 15px; display: flex; align-items: center; gap: 15px;">
            <strong style="color: white;">Live Scale Last Edited Icon:</strong>
            <input type="range" id="live-scale-slider" min="0.1" max="5.0" step="0.1" value="1.0" oninput="updateLiveScale(this.value)" style="flex-grow: 1;">
            <span id="live-scale-display" style="color: #4DA8DA; font-weight: bold; width: 40px; font-size: 16px;">1.0x</span>
        </div>
        <textarea id="dev-output" style="width: 100%; height: 200px; background: #000; color: #0f0; font-family: monospace; border: 1px solid #333; margin-top: 10px; white-space: pre;" readonly></textarea>
    </div>

    <script src="hc-data.js"></script>
    <script src="powerhouse-data.js"></script>

    <script src="spritesheet.js"></script>
    <script src="icons.js"></script>

    <script src="aesica-translator.js"></script>

    <script src="data.js"></script>

    <script src="custom-additions.js"></script>

    <script src="app.js"></script>
</body>
</html>
